<script>
 
  window.onload = function () {
    carregarAules();
  };

  function carregarAules() {
    google.script.run
      .withSuccessHandler(function (aules) {
        const select = document.getElementById("aula");

        aules.forEach((aula) => {
          let option = document.createElement("option");

          option.value = aula;
          option.textContent = aula;

          select.appendChild(option);
        });
      })
      .obtenirAules();
  }

  function crearGraellaAlumnes() {
    let aula = document.getElementById("aula").value;
    document.getElementById("taulaAlumnes")?.remove(); // L'operador ?. elimina la taula només si existeix.

    google.script.run
      .withSuccessHandler(crearGraellaAlumnesCorrectament)
      .withFailureHandler(crearGraellaAlumnesError)
      .obtenirAlumnes(aula);
  }

  function crearGraellaAlumnesCorrectament(obj) {
    taula = document.createElement("table");
    taula.id = "taulaAlumnes";

    let taulaHeader = document.createElement("thead");
    let taulaBody = document.createElement("tbody");

    let primeraFila = document.createElement("tr");
    for (let i = 0; i < obj[0].length; i++) {
      let cella = document.createElement("th");
      cella.textContent = obj[0][i];
      primeraFila.appendChild(cella);
    }
    taulaHeader.appendChild(primeraFila);
    taula.appendChild(taulaHeader);

    for (let i = 1; i < obj.length; i++) {
      let fila = document.createElement("tr");
      for (let j = 0; j < obj[i].length; j++) {
        let cella = document.createElement("td");
        cella.textContent = obj[i][j];
        fila.appendChild(cella);
      }
      taulaBody.appendChild(fila);
    }

    // Agregem cos a la taula
    taula.appendChild(taulaBody);
    // Agregem estil al header
    taulaHeader.classList.add(
      "table",
      "table-info",
      "border-dark",
      "border-4"
    );
    // Agregem estil a la taula
    taula.classList.add(
      "table",
      "table-striped",
      "table-hover",
      "border",
      "border-dark",
      "border-4"
    );
    // Agregem taula a la pàgina
    document.getElementById("divAlumnes").appendChild(taula);

    // Mostrar notificació de ok
    crearNotificacioOK(
      "mostrat l'alumnat de la classe correctament",
      "Tot en ordre",
    );
  }

  function crearGraellaAlumnesError() {
    // Mostrar notificació de error
    crearNotificacioError(
        "No s'han pogut mostrar els alumnes",
        "ERROR"
    );
  }

  function crearNotificacio(missatge,titol) {
    document.getElementById("missatgeNotificacio").textContent = missatge;
    document.getElementById("titolNotificacio").textContent = titol;
    let elementNotificacio = document.getElementById("notificacio");
    bootstrap.Toast.getOrCreateInstance(elementNotificacio).show();
  }

  function crearNotificacioOK(missatge,titol) {
    crearNotificacio(missatge, titol);
    crearIconaNotificacioOK();
    crearColorNotificacio("--color-verd-lima");
  }

  function crearNotificacioError(missatge,titol) {
    crearNotificacio(missatge, titol);
    crearIconaNotificacioError();
    crearColorNotificacio("--color-vermell-bug");
  }

  function crearNotificacioAdvertencia(missatge,titol) {
    crearNotificacio(missatge, titol);
    crearIconaNotificacioAdvertencia();
    crearColorNotificacio("--color-groc-warning");
  }

  function crearIconaNotificacioOK() {
    document.getElementById("iconaNotificacio").className = "";
    document.getElementById("iconaNotificacio").classList.add("bi", "bi-check2-circle");
  }

  function crearIconaNotificacioError() {
    document.getElementById("iconaNotificacio").className = "";
    document.getElementById("iconaNotificacio").classList.add("bi", "bi-bug");
  }

  function crearIconaNotificacioAdvertencia() {
    document.getElementById("iconaNotificacio").className = "";
    document.getElementById("iconaNotificacio").classList.add("bi", "bi-exclamation-circle");
  }

  function crearColorNotificacio(color) {
    let elementNotificacio = document.getElementById("notificacio");
    elementNotificacio.style.backgroundColor = getComputedStyle(
          document.documentElement,
        ).getPropertyValue(color);
  }

  function actualitzarRellotge() {
    const ara = new Date();

    const data = ara.toLocaleDateString("ca-ES", {
      weekday: "long",
      day: "2-digit",
      month: "long",
      year: "numeric",
    });

    const hora = ara.toLocaleTimeString("ca-ES", {
      hour: "2-digit",
      minute: "2-digit",
      second: "2-digit",
    });

    document.getElementById("rellotge").textContent = `📅 ${data}   🕒 ${hora}`;
  }

  // Actualitza immediatament
  actualitzarRellotge();

  // Torna a actualitzar cada segon
  setInterval(actualitzarRellotge, 1000);
</script>
