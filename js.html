<script>
  let alumnes = [];

  const FRANGES_HORARIES = [
    {
      inici: "08:15",
      final: "09:15",
    },

    {
      inici: "09:15",
      final: "10:10",
    },

    {
      inici: "10:35",
      final: "11:35",
    },

    {
      inici: "11:35",
      final: "12:35",
    },

    {
      inici: "12:35",
      final: "13:35",
    },

    {
      inici: "13:35",
      final: "14:35",
    },
  ];

  window.onload = function () {
    carregarAules();
  };

  function carregarAules() {
    google.script.run
      .withSuccessHandler(function (aules) {
        const select = document.getElementById("aula");

        aules.forEach((aula) => {
          let option = document.createElement("option");

          option.value = aula;
          option.textContent = aula;

          select.appendChild(option);
        });
      })
      .withFailureHandler(crearGraellaAlumnesError)
      .obtenirAules();
  }

  function crearGraellaAlumnes() {
    let aula = document.getElementById("aula").value;

    // Eliminar taula
    eliminarGraella();

    // Crear loader
    crearLoaderAnell("divAlumnes");
    google.script.run
      .withSuccessHandler(crearGraellaAlumnesCorrectament)
      .withFailureHandler(crearGraellaAlumnesError)
      .obtenirAlumnes(aula);
  }

  function crearGraellaAlumnesCorrectament(obj) {
    taula = document.createElement("table");
    taula.id = "taulaAlumnes";

    let taulaHeader = document.createElement("thead");
    let taulaBody = document.createElement("tbody");

    let primeraFila = document.createElement("tr");

    // Primera columna
    let cella = document.createElement("th");
    cella.textContent = "Alumne";
    primeraFila.appendChild(cella);

    // Franges horàries
    FRANGES_HORARIES.forEach((hora) => {
      cella = document.createElement("th");
      cella.textContent = `${hora.inici}-${hora.final}`;
      primeraFila.appendChild(cella);
    });

    taulaHeader.appendChild(primeraFila);
    taula.appendChild(taulaHeader);

    alumnes = [];

    // Primera columna: Cognoms + Nom
    for (let i = 1; i < obj.length; i++) {
      alumnes.push({
        aula: document.getElementById("aula").value,
        fila: i,
        absent: false,
        horaInici: null,
        horaArribada: null,
        justificat: false,
      });

      let fila = document.createElement("tr");

      // Primera columna: Cognoms + Nom
      let cella = document.createElement("td");
      cella.textContent = `${obj[i][0]} ${obj[i][1]}, ${obj[i][2]}`;
      fila.appendChild(cella);

      FRANGES_HORARIES.forEach((franja, index) => {
        const cella = document.createElement("td");

        cella.dataset.alumne = obj[i][0] + "|" + obj[i][1] + "|" + obj[i][2];
        cella.dataset.fila = i;
        cella.dataset.aula = document.getElementById("aula").value;
        cella.dataset.franja = index;

        cella.addEventListener("click", clicarFranja);

        fila.appendChild(cella);
      });

      taulaBody.appendChild(fila);

      // Fila de la barra
const filaBarra = document.createElement("tr");

const tdBuida = document.createElement("td");
tdBuida.textContent = "";
filaBarra.appendChild(tdBuida);

// Cel·la que ocupa totes les franges
const tdBarra = document.createElement("td");
tdBarra.colSpan = FRANGES_HORARIES.length;
tdBarra.classList.add("td-barra");

// Ens servirà per localitzar-la després
tdBarra.dataset.aula = document.getElementById("aula").value;
tdBarra.dataset.fila = i;

filaBarra.appendChild(tdBarra);

taulaBody.appendChild(filaBarra);

    }

    // Agregem cos a la taula
    taula.appendChild(taulaBody);
    // Agregem estil al header
    taulaHeader.classList.add("table", "table-info", "border-dark", "border-4");
    // Agregem estil a la taula
    taula.classList.add(
      "table",
      "table-striped",
      "table-hover",
      "border",
      "border-dark",
      "border-4",
    );
    // Agregem taula a la pàgina
    document.getElementById("divAlumnes").appendChild(taula);

    // Mostrar notificació de ok
    crearNotificacioOK(
      "mostrat l'alumnat de la classe correctament",
      "Tot en ordre",
    );

    // Eliminem el loader
    eliminarLoader();

    // Actualitzar la taula cada minut
    iniciarActualitzacioBarres();
  }

  function crearGraellaAlumnesError() {
    //crear Loader
    crearLoaderAnell();
    // Mostrar notificació de error
    crearNotificacioError("No s'han pogut mostrar els alumnes", "ERROR");
    // Eliminem el loader
    eliminarLoader();
  }

  function clicarFranja(e) {
    const cella = e.currentTarget;
    const alumne = alumnes.find(
      (a) => a.aula === cella.dataset.aula && a.fila == cella.dataset.fila,
    );

    iniciarAbsencia(alumne);

    renderitzarAlumne(alumne);
  }

  function iniciarAbsencia(aula, fila) {
    const alumne = alumnes.find((a) => a.aula === aula && a.fila === fila);

    if (!alumne || alumne.absent) return;

    alumne.absent = true;
    alumne.horaInici = new Date();
  }

  function crearBarraProgres(cella) {
    const contenidor = document.createElement("div");
    contenidor.className = "barra-contenidor";

    const barra = document.createElement("div");
    barra.className = "barra-progres";

    contenidor.appendChild(barra);

    cella.appendChild(contenidor);

    return barra;
  }

  function renderitzarAlumne(alumne){

    const percentatge = alumne.horaArribada
        ? calcularPercentatge(alumne.horaArribada)
        : calcularPercentatgeActual();

    pintarBarra(alumne, percentatge);

}

  function calcularPercentatge(horaArribada) {
    const inici = 8 * 60 + 15;
    const final = 14 * 60 + 35;

    const [hores, minuts] = horaArribada.split(":").map(Number);

    const arribada = hores * 60 + minuts;

    const minutsAbsencia = arribada - inici;

    const percentatge = Math.max(
      0,
      Math.min(100, (minutsAbsencia / (final - inici)) * 100),
    );

    return percentatge;
  }

  function calcularPercentatgeActual() {
    const ara = new Date();

    const minutsActuals = ara.getHours() * 60 + ara.getMinutes();

    const inici = 8 * 60 + 15;
    const final = 14 * 60 + 15;

    return Math.max(
      0,
      Math.min(100, ((minutsActuals - inici) / (final - inici)) * 100),
    );
  }

  let intervalBarra = null;

  function iniciarActualitzacioBarres() {
    if (intervalBarra) {
      clearInterval(intervalBarra);
    }

    actualitzarTotsElsAlumnes();

    intervalBarra = setInterval(actualitzarTotsElsAlumnes, 60000);
  }

  function actualitzarTotsElsAlumnes() {
    document.querySelectorAll(".barra-progres").forEach((barra) => {
      if (barra.dataset.arribat) return;

      const percentatge = calcularPercentatgeActual();

      barra.style.width = percentatge + "%";
      barra.style.backgroundColor = obtenirColorBarra(percentatge);
    });
  }

  function pintarBarra(alumne, percentatge){

    const barra = crearBarraSiNoExisteix(alumne);

    barra.style.width = percentatge + "%";
    barra.style.backgroundColor = obtenirColorBarra(percentatge);

}

  function crearBarraSiNoExisteix(alumne){

    const tdBarra = document.querySelector(

        `.td-barra[data-aula="${alumne.aula}"][data-fila="${alumne.fila}"]`

    );

    let barra = tdBarra.querySelector(".barra-progres");

    if(barra){
        return barra;
    }

    const contenidor = document.createElement("div");
    contenidor.className = "barra-contenidor";

    barra = document.createElement("div");
    barra.className = "barra-progres";

    contenidor.appendChild(barra);

    tdBarra.appendChild(contenidor);

    return barra;
}

  function obtenirColorCSS(variableCSS) {
    return getComputedStyle(document.documentElement)
      .getPropertyValue(variableCSS)
      .trim();
  }

  function obtenirColorBarra(percentatge) {
    if (percentatge < 33) {
      return obtenirColorCSS("--color-verd-lima");
    }

    if (percentatge < 66) {
      return obtenirColorCSS("--color-groc-warning");
    }

    return obtenirColorCSS("--color-vermell-bug");
  }

  function crearNotificacio(missatge, titol) {
    document.getElementById("missatgeNotificacio").textContent = missatge;
    document.getElementById("titolNotificacio").textContent = titol;
    let elementNotificacio = document.getElementById("notificacio");
    bootstrap.Toast.getOrCreateInstance(elementNotificacio).show();
  }

  function crearNotificacioOK(missatge, titol) {
    crearNotificacio(missatge, titol);
    crearIconaNotificacioOK();
    crearColorNotificacio("--color-verd-lima");
  }

  function crearNotificacioError(missatge, titol) {
    crearNotificacio(missatge, titol);
    crearIconaNotificacioError();
    crearColorNotificacio("--color-vermell-bug");
  }

  function crearNotificacioAdvertencia(missatge, titol) {
    crearNotificacio(missatge, titol);
    crearIconaNotificacioAdvertencia();
    crearColorNotificacio("--color-groc-warning");
  }

  function crearIconaNotificacioOK() {
    document.getElementById("iconaNotificacio").className = "";
    document
      .getElementById("iconaNotificacio")
      .classList.add("bi", "bi-check2-circle");
  }

  function crearIconaNotificacioError() {
    document.getElementById("iconaNotificacio").className = "";
    document.getElementById("iconaNotificacio").classList.add("bi", "bi-bug");
  }

  function crearIconaNotificacioAdvertencia() {
    document.getElementById("iconaNotificacio").className = "";
    document
      .getElementById("iconaNotificacio")
      .classList.add("bi", "bi-exclamation-circle");
  }

  function crearColorNotificacio(color) {
    let elementNotificacio = document.getElementById("notificacio");
    elementNotificacio.style.backgroundColor = getComputedStyle(
      document.documentElement,
    ).getPropertyValue(color);
  }

  function crearLoader(elementPare) {
    eliminarLoader();
    let loader = document.createElement("div");
    loader.id = "loader";
    loader.appendChild(document.createElement("div"));
    loader.appendChild(document.createElement("div"));
    loader.appendChild(document.createElement("div"));
    loader.appendChild(document.createElement("div"));
    return document.getElementById(elementPare).appendChild(loader);
  }

  function crearLoaderPunts(elementPare) {
    let loader = crearLoader(elementPare);
    loader.classList.add("lds-ellipsis");
  }

  function crearLoaderAnell(elementPare) {
    let loader = crearLoader(elementPare);
    loader.classList.add("lds-dual-ring");
  }

  function eliminarLoader() {
    document.getElementById("loader")?.remove(); // L'operador ?. elimina el loader només si existeix.
  }

  function eliminarGraella() {
    document.getElementById("taulaAlumnes")?.remove(); // L'operador ?. elimina la taula només si existeix.
  }

  function actualitzarRellotge() {
    const ara = new Date();

    const data = ara.toLocaleDateString("ca-ES", {
      weekday: "long",
      day: "2-digit",
      month: "long",
      year: "numeric",
    });

    const hora = ara.toLocaleTimeString("ca-ES", {
      hour: "2-digit",
      minute: "2-digit",
      second: "2-digit",
    });

    document.getElementById("rellotge").textContent = `📅 ${data}   🕒 ${hora}`;
  }

  // Actualitza immediatament
  actualitzarRellotge();

  // Torna a actualitzar cada segon
  setInterval(actualitzarRellotge, 1000);
</script>
