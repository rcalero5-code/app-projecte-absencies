<style>
  :root {
    --color-cyan-blau: #343a40;
    --color-magenta-rosa: #ff07d2;
    --color-verd-lima: #32cd32;
    --color-groc-warning: #f59622;
    --color-vermell-bug: #aa0000;
    --color-blau-verdos: #0f9dba;
    --color-gris-clar: #ececec;
  }

  .rellotge {
    --mida: 180px;

    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    width: var(--mida);
    height: var(--mida);
    border-radius: 50%;
    margin: 20px auto;

    outline: 8px solid var(--color-cyan-blau);

    background:
      repeating-radial-gradient(
        circle at center,
        rgba(255, 255, 255, 0.08) 0%,
        rgba(255, 255, 255, 0.08) 2%,
        transparent 2%,
        transparent 4%
      ),
      conic-gradient(#fafafa, #cfcfcf, #ffffff, #d6d6d6, #ffffff);

    box-shadow:
      inset 0 0 18px rgba(0, 0, 0, 0.35),
      0 10px 25px rgba(0, 0, 0, 0.25);
  }

  .agulla {
    position: absolute;
    left: 50%;
    bottom: 50%;
    transform-origin: bottom center;
    border-radius: 10px;
  }

  .agulla.hora {
    width: 6px;
    height: 48px;
    margin-left: -3px;
    background: #444;
  }

  .agulla.minut {
    width: 4px;
    height: 68px;
    margin-left: -2px;
    background: #666;
  }
  .agulla.segon {
    width: 2px;
    height: 75px;
    margin-left: -1px;
    background: var(--color-vermell-bug);
  }

  .centre {
    position: absolute;
    width: 14px;
    height: 14px;

    background: var(--color-cyan-blau);
    border: 3px solid white;

    border-radius: 50%;

    top: 50%;
    left: 50%;

    transform: translate(-50%, -50%);
  }

  .marca {
    position: absolute;
    width: 4px;
    height: 14px;
    background: #444;
    left: 50%;
    top: 6px;
    margin-left: -2px;
    transform-origin: 2px 84px;
  }

  .data-actual,
  .hora-actual {
    margin-top: 12px;
    text-align: center;
    font-family: Montserrat, sans-serif;
    font-size: 1rem;
    font-weight: 600;
    color: white;
  }

  .salvapantalles{

    position:fixed;

    inset:0;

    display:none;

    justify-content:center;

    align-items:center;

    background:#111;

    z-index:99999;

}

.salvapantalles.actiu{

    display:flex;

}

  header {
    background-color: var(--color-cyan-blau); /* Color de fons del header */
    color: var(--color-gris-clar); /* Color del text del header */
    padding: 10px 0; /* Espaiat intern del header */
  }

  footer a {
    font-size: 1.5rem;
    color: var(--color-verd-lima);
    transition: all 0.3s ease-in-out;
  }

  footer a:hover {
    color: var(--color-magenta-rosa) !important;
    transform: scale(2);
  }

  td {
    position: relative;
  }

  .td-barra {
    padding: 2px 6px;
  }

  td:hover {
    transform: scale(1.15); /* Agranda el div un 15% */
    color: var(--color-groc-warning); /* Cambia el texto a color amarillo */
    text-shadow: 0px 0px 8px var(--color-gris-clar); /* Crea un brillo blanco en las letras */
  }

  /* La transición hace que el cambio sea suave */
  tbody tr {
    transition: background-color 0.3s ease;
  }

  /* Efecto al pasar el ratón */
  /* tbody tr:hover {
    background-color: #d1ecf1; /* Azul muy claro 
} */

  /* Efecto al hacer clic */
  /* tbody tr:active {
    background-color: #bee5eb;
    transform: scale(0.99); /* Se encoge un 1% al hacer clic 
} */

  /* Selecciona la fila (tr) SOLO SI tiene un td que está en hover */
  tr:has(td:hover) {
    background-color: #d1ecf1; /* Cambia el fondo de toda la fila */
  }

  /* Opcional: Si quieres que cambie al hacer clic (active) en un td */
  tr:has(td:active) {
    background-color: #bee5eb;
    transform: scale(0.99); /* Efecto de hundido en toda la fila */
  }

  .barra-contenidor {
    width: 100%;
    height: 8px;

    background: var(--color-gris-clar);

    border-radius: 20px;

    overflow: hidden;
  }

  .barra-progres {
    width: 0%;
    height: 100%;

    border-radius: 20px;

    transition:
      width 0.4s ease,
      background-color 0.3s ease;
  }

  .icona-notificacio {
    font-size: 1.5rem;
    padding: 0.5rem;
    margin-left: 2px;
  }

  /* LOADERS ANELL */

  .lds-dual-ring,
  .lds-dual-ring:after {
    box-sizing: border-box;
  }
  .lds-dual-ring {
    display: inline-block;
    width: 80px;
    height: 80px;
  }
  .lds-dual-ring:after {
    content: " ";
    display: block;
    width: 64px;
    height: 64px;
    margin: 8px;
    border-radius: 50%;
    border: 6.4px solid var(--color-blau-verdos);
    border-color: var(--color-blau-verdos) transparent var(--color-blau-verdos)
      transparent;
    animation: lds-dual-ring 1.2s linear infinite;
  }
  @keyframes lds-dual-ring {
    0% {
      transform: rotate(0deg);
    }
    100% {
      transform: rotate(360deg);
    }
  }

  /* LOADER TRES PUNTS */

  .lds-ellipsis,
  .lds-ellipsis div {
    box-sizing: border-box;
  }
  .lds-ellipsis {
    display: inline-block;
    position: relative;
    width: 80px;
    height: 80px;
  }
  .lds-ellipsis div {
    position: absolute;
    top: 33.33333px;
    width: 13.33333px;
    height: 13.33333px;
    border-radius: 50%;
    background: var(--color-blau-verdos);
    animation-timing-function: cubic-bezier(0, 1, 1, 0);
  }
  .lds-ellipsis div:nth-child(1) {
    left: 8px;
    animation: lds-ellipsis1 0.6s infinite;
  }
  .lds-ellipsis div:nth-child(2) {
    left: 8px;
    animation: lds-ellipsis2 0.6s infinite;
  }
  .lds-ellipsis div:nth-child(3) {
    left: 32px;
    animation: lds-ellipsis2 0.6s infinite;
  }
  .lds-ellipsis div:nth-child(4) {
    left: 56px;
    animation: lds-ellipsis3 0.6s infinite;
  }
  @keyframes lds-ellipsis1 {
    0% {
      transform: scale(0);
    }
    100% {
      transform: scale(1);
    }
  }
  @keyframes lds-ellipsis3 {
    0% {
      transform: scale(1);
    }
    100% {
      transform: scale(0);
    }
  }
  @keyframes lds-ellipsis2 {
    0% {
      transform: translate(0, 0);
    }
    100% {
      transform: translate(24px, 0);
    }
  }
